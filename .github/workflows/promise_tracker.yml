name: Satya Promise Tracker

on:
  repository_dispatch:
    types: [trigger-promise-tracker]  # Listens for the dispatch event from the other repository
  workflow_dispatch:                  # Allows manually running the workflow from the GitHub UI

concurrency:
  group: satya-promise-tracker
  cancel-in-progress: false

jobs:
  track_promises:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write  # Added permission to commit and push changes back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-promise-tracker-v3 # Bust cache for semantic transformers update

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Force clean compilation from source with native AVX/AVX2 CPU vector acceleration
          CMAKE_ARGS="-DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON" \
          pip install --no-cache-dir --force-reinstall --no-binary :all: llama-cpp-python==0.2.90

      - name: Download Gemma LLM Model
        run: |
          mkdir -p models
          # Download gemma-2-9b-it quantized model from Hugging Face if not present
          python -c '
          import os
          from huggingface_hub import hf_hub_download
          model_path = "./models/gemma-2-9b-it-Q6_K.gguf"
          if not os.path.exists(model_path):
              hf_hub_download(repo_id="lmstudio-community/gemma-2-9b-it-GGUF", filename="gemma-2-9b-it-Q6_K.gguf", local_dir="./models")
          '

      - name: Run Promise Tracker
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          PROMISES_JSON_URL: 'https://raw.githubusercontent.com/raam-07/Satya-promise-tracker/main/promises.json'
        run: |
          python promise_tracker.py

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add promises.json review_promises.json
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update promises registry and evidence logs [skip ci]" && git push)
