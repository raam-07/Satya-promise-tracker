name: Satya Promise Tracker

on:
  repository_dispatch:
    types: [trigger-promise-tracker]  # Listens for the dispatch event from the other repository
  workflow_dispatch:                  # Allows manually running the workflow from the GitHub UI

concurrency:
  group: satya-promise-tracker
  cancel-in-progress: false

jobs:
  track_promises:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write  # Added permission to commit and push changes back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-promise-tracker-v1

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Installs llama-cpp-python with default auto-detection to enable native AVX/AVX2 CPU vector acceleration
          pip install llama-cpp-python==0.2.90

      - name: Cache Gemma Model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ./models
          key: gemma-2-9b-it-Q6_K

      - name: Download Gemma Model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./models
          python -c "
          from huggingface_hub import hf_hub_download
          hf_hub_download(
            repo_id='bartowski/gemma-2-9b-it-GGUF',
            filename='gemma-2-9b-it-Q6_K.gguf',
            local_dir='./models'
          )
          "

      - name: Download current promises.json
        env:
          PROMISES_JSON_URL: ${{ secrets.PROMISES_JSON_URL }}
        run: |
          curl -L "$PROMISES_JSON_URL" -o ./promises.json
          echo "Downloaded promises.json"

      - name: Run Promise Tracker
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          PROMISES_JSON_URL: ${{ secrets.PROMISES_JSON_URL }}
          PYTHONUNBUFFERED: "1"  # Forces Python to flush every log line to the screen instantly
        run: |
          python promise_tracker.py

      - name: Commit updated promises.json back to repo
        run: |
          git config --local user.email "satya-bot@github.com"
          git config --local user.name "Satya Bot"
          git add promises.json review_promises.json
          git diff --staged --quiet || git commit -m "Auto-update promises.json [$(date '+%Y-%m-%d')]"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promise-tracker-output-${{ github.run_number }}
          path: |
            promises.json
            review_promises.json
            *.log
          retention-days: 14
