name: Satya Promise Tracker

on:
  repository_dispatch:
    types: [trigger-promise-tracker]  # Listens for the dispatch event from the other repository
  workflow_dispatch:                  # Allows manually running the workflow from the GitHub UI
    inputs:
      recategorize:
        description: 'Run recategorization and exit'
        required: false
        type: boolean
        default: false
      backfill_importance:
        description: 'Run backfill importance and exit'
        required: false
        type: boolean
        default: false

concurrency:
  group: satya-promise-tracker
  cancel-in-progress: false



jobs:
  track_promises:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write  # Added permission to commit and push changes back to the repository
      actions: write


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-promise-tracker-v4 # Bust cache to v4 to build and cache compiled AVX2 wheel

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Compile with native AVX/AVX2 CPU vector acceleration (pip will cache the compiled binary for subsequent runs)
          CMAKE_ARGS="-DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON" \
          pip install llama-cpp-python==0.2.90

      - name: Cache Gemma Models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ./models
          key: gemma-2-local-models-q4-v3

      - name: Download Gemma LLM Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p models
          # Download gemma-2-2b-it and gemma-2-9b-it Q4_K_M quantized models from Hugging Face if not present
          python -c '
          import os, shutil
          from huggingface_hub import hf_hub_download
          
          temp_cache = "./models/.hf_cache"
          os.makedirs(temp_cache, exist_ok=True)
          
          # Gemma 2B
          model_2b = "./models/gemma-2-2b-it-Q4_K_M.gguf"
          if not os.path.exists(model_2b):
              print("Downloading Gemma 2B...")
              hf_hub_download(
                  repo_id="bartowski/gemma-2-2b-it-GGUF",
                  filename="gemma-2-2b-it-Q4_K_M.gguf",
                  local_dir="./models",
                  local_dir_use_symlinks=False,
                  cache_dir=temp_cache
              )
              if os.path.exists(temp_cache):
                  shutil.rmtree(temp_cache)
                  os.makedirs(temp_cache, exist_ok=True)
              
          # Gemma 9B
          model_9b = "./models/gemma-2-9b-it-Q4_K_M.gguf"
          if not os.path.exists(model_9b):
              print("Downloading Gemma 9B...")
              hf_hub_download(
                  repo_id="bartowski/gemma-2-9b-it-GGUF",
                  filename="gemma-2-9b-it-Q4_K_M.gguf",
                  local_dir="./models",
                  local_dir_use_symlinks=False,
                  cache_dir=temp_cache
              )
              if os.path.exists(temp_cache):
                  shutil.rmtree(temp_cache)
          '

      - name: Run Promise Tracker
        id: run-step
        env:
          PROMISES_JSON_URL: 'https://raw.githubusercontent.com/raam-07/Satya-promise-tracker/main/promises.json'
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.recategorize }}" = "true" ]; then
            python promise_tracker_pipeline.py --recategorize
          elif [ "${{ github.event.inputs.backfill_importance }}" = "true" ]; then
            python promise_tracker_pipeline.py --backfill-importance
          else
            python promise_tracker_pipeline.py --batch-size 500
          fi

      - name: Guard — block accidental promise deletions
        run: |
          python - << 'EOF'
          import json, subprocess, sys
          # promises.json as it was at HEAD (before this run modified it)
          try:
              old_raw = subprocess.check_output(['git', 'show', 'HEAD:promises.json'])
              old_ids = {p['id'] for p in json.loads(old_raw)['promises']}
          except Exception:
              print('No previous promises.json at HEAD — skipping guard.')
              sys.exit(0)
          new_ids = {p['id'] for p in json.load(open('promises.json'))['promises']}
          removed = old_ids - new_ids
          if removed:
              print(f'BLOCKED: this run would DELETE {len(removed)} promise(s): {sorted(removed)[:10]}')
              print('The tracker never legitimately auto-removes promises. Restoring previous file and failing.')
              subprocess.check_call(['git', 'checkout', 'HEAD', '--', 'promises.json'])
              sys.exit(1)
          print(f'Deletion guard passed: {len(old_ids)} -> {len(new_ids)} promises (additions only).')
          EOF

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add promises.json review_promises.json

          # Commit only if there are changes
          if ! git diff --staged --quiet; then
            echo "Changes detected, committing..."
            git commit -m "Auto-update promises registry and evidence logs [skip ci]"

            # Pull latest changes to avoid conflicts
            echo "Pulling latest changes with rebase..."
            git pull --rebase origin main

            # Push with Retry Logic
            echo "Pushing changes..."
            MAX_RETRIES=3
            RETRY_COUNT=0

            until git push origin HEAD:main || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "Push failed, retry $RETRY_COUNT of $MAX_RETRIES..."
              sleep 2
              git pull --rebase origin main
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi

            echo "Successfully pushed changes"
          else
            echo "No changes to commit"
          fi

      - name: Trigger Self Loop
        if: steps.run-step.outputs.has_more == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "More unprocessed articles remain in the Database. Triggering next batch run..."
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/promise_tracker.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Revalidate Content Cache
        if: steps.run-step.outputs.has_more != 'true'
        run: |
          echo "Final batch complete. Revalidating all content caches..."
          curl -s -X POST "https://satyadheesh.in/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}"

